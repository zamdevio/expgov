# CI — build gate on every push and PR
#
# Job DAG:
#   verify (ubuntu) → test-matrix (ubuntu | windows | macos)
#
# Ubuntu runs the full maintainer gate: typecheck, test, build, madge:circular,
# dogfood validate, examples/sdk validate, docs:sync:verify.
# Matrix legs re-run tests on Windows and macOS for path/platform regressions.
#
# Engineering map: maintainer/systems/README.md · Build gate in .cursor/rules

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify version alignment
        run: pnpm versions:verify

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

      - name: madge circular
        run: pnpm madge:circular

      - name: dogfood validate
        run: node dist/cli.js validate

      - name: example SDK validate
        run: node dist/cli.js -C examples/sdk validate

      - name: docs sync verify
        run: pnpm docs:sync:verify

  test-matrix:
    name: test (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            timeout: 30
          - os: windows-latest
            timeout: 45
          - os: macos-latest
            timeout: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: test
        run: pnpm test

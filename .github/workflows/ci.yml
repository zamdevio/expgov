# CI — build gate on every push and PR
#
# typecheck ∥ test → build → madge → dogfood validate
# Engineering map: maintainer/systems/README.md · Build gate in .cursor/rules

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck @expgov/core
        run: pnpm core:typecheck

      - name: Build @expgov/core declarations
        run: pnpm core:build

      - name: Typecheck CLI
        run: pnpm cli:typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

  build:
    name: build & validate
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Circular dependency check
        run: pnpm madge:circular

      - name: Dogfood validate
        run: node dist/cli.js validate

# Repo hygiene on main pushes (non-blocking advisory)
#
# knip + madge orphans/leaves — triage in maintainer; does not block merge.
# Manual re-run: workflow_dispatch.

name: Architecture

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  knip:
    name: knip
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: knip
        run: pnpm knip
        continue-on-error: true

  madge:
    name: madge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Circular imports
        run: pnpm madge:circular
        continue-on-error: true

      - name: Orphan modules
        run: pnpm madge:orphans
        continue-on-error: true

      - name: Leaf modules
        run: pnpm madge:leaves
        continue-on-error: true
